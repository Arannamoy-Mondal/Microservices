services:
  accounts:
    image: "accounts:m1"
    container_name: accounts_m1_1
    network_mode: "host"
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          memory: 700m


  loans:
    image: "loans:latest"
    container_name: accounts_m3_1
    network_mode: "host"
    ports:
      - "8003:8003"
    deploy:
      resources:
        limits:
          memory: 700m


  cards:
    image: "cards:m2"
    container_name: cards_m2_1
    network_mode: "host"
    ports:
      - "8002:8002"
    deploy:
      resources:
        limits:
          memory: 700m



